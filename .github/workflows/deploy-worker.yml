name: deploy-worker

# The API worker changes rarely, so this is separate from the site pipeline and
# path-filtered: it only runs when files under worker/ change on main. The site
# deploy (ci.yml) is unaffected.
on:
  push:
    branches: [main]
    paths: ['worker/**']

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:worker
      - run: npm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
