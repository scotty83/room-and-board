<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Widget audit harness</title>
<link rel="stylesheet" href="css/main.css">
<style>
  /* Fix the app at the board's true logical size so cell geometry is exact. */
  html, body { margin: 0; overflow: auto; }
  #app { width: 1920px; height: 1080px; }
  #audit-meta { position: fixed; right: 8px; bottom: 8px; z-index: 99; font: 12px monospace;
    color: #93a0b4; background: rgba(13,17,23,.9); padding: 4px 8px; border-radius: 6px; }
</style>
</head>
<body>
  <div id="app">
    <header class="topbar" id="topbar"></header>
    <main class="grid" id="grid"></main>
  </div>
  <div id="audit-meta"></div>
<script>
  // Deterministic captures: ?freeze=<epochMs> pins Date so before/after
  // pixel-diffs aren't polluted by the live clock / world-clock rows.
  (() => {
    const f = new URLSearchParams(location.search).get('freeze');
    if (!f) return;
    const fixed = Number(f);
    const RealDate = Date;
    class FrozenDate extends RealDate {
      constructor(...a) { a.length ? super(...a) : super(fixed); }
      static now() { return fixed; }
    }
    FrozenDate.parse = RealDate.parse;
    FrozenDate.UTC = RealDate.UTC;
    window.Date = FrozenDate;
  })();
</script>
<script type="module">
  import { normalizeConfig, DEFAULT_CONFIG } from './js/config.js';
  import { MIN_SIZE, DEFAULT_LAYOUT, firstFit } from './js/layout.js';
  import { DEMO_VMS } from './demo/fixtures.js';
  import * as clock from './js/widgets/clock.js';
  import * as weather from './js/widgets/weather.js';
  import * as subway from './js/widgets/subway.js';
  import * as lirr from './js/widgets/lirr.js';
  import * as mnr from './js/widgets/mnr.js';
  import * as njt from './js/widgets/njt.js';
  import * as amtrak from './js/widgets/amtrak.js';
  import * as pathw from './js/widgets/path.js';
  import * as ferry from './js/widgets/ferry.js';
  import * as bus from './js/widgets/bus.js';
  import * as citibike from './js/widgets/citibike.js';
  import * as tfl from './js/widgets/tfl.js';
  import * as art from './js/widgets/art.js';
  import * as photos from './js/widgets/photos.js';
  import * as gdrivephotos from './js/widgets/gdrivephotos.js';
  import * as apod from './js/widgets/apod.js';
  import * as history from './js/widgets/history.js';
  import * as aqi from './js/widgets/aqi.js';
  import * as quote from './js/widgets/quote.js';
  import * as wotd from './js/widgets/wotd.js';
  import * as markets from './js/widgets/markets.js';
  import * as marketsnews from './js/widgets/marketsnews.js';
  import * as worldclock from './js/widgets/worldclock.js';
  import * as sports from './js/widgets/sports.js';
  import * as worldcup from './js/widgets/worldcup.js';
  import * as news from './js/widgets/news.js';
  import * as substack from './js/widgets/substack.js';
  import * as bsky from './js/widgets/bsky.js';
  import * as services from './js/widgets/services.js';
  import * as chart from './js/widgets/chart.js';
  import * as f1 from './js/widgets/f1.js';
  import * as golf from './js/widgets/golf.js';
  import * as tennis from './js/widgets/tennis.js';

  const MODULES = [weather, subway, lirr, mnr, njt, amtrak, pathw, ferry, bus, citibike, tfl,
    art, photos, gdrivephotos, apod, history, aqi, quote, wotd, markets, marketsnews, worldclock,
    sports, worldcup, news, substack, bsky, services, chart, f1, golf, tennis];
  const byId = Object.fromEntries(MODULES.map((m) => [m.meta.id, m]));

  const q = new URLSearchParams(location.search);
  const mode = q.get('mode') ?? 'min';        // min | rep
  const page = Number(q.get('page') ?? 1);
  // Single theme since the 2026-07-19 fold — ?theme= is accepted but inert.
  const only = (q.get('ids') ?? '').split(',').filter(Boolean);

  const cfg = normalizeConfig(structuredClone(DEFAULT_CONFIG));
  clock.render(document.getElementById('topbar'), null, cfg);

  const repSize = (id) => {
    const d = DEFAULT_LAYOUT.find((r) => r.id === id);
    if (d) return [d.w, d.h];
    const [mw, mh] = MIN_SIZE[id];
    return [Math.max(mw, 3), Math.max(mh, 3)];
  };

  // Paginate: pack widgets into 12x8 pages with the real placement algorithm.
  const ids = only.length ? only : MODULES.map((m) => m.meta.id);
  const forceW = Number(q.get('w')) || 0;   // explicit size override (single-id runs)
  const forceH = Number(q.get('h')) || 0;
  const pages = [[]];
  let layout = [];
  for (const id of ids) {
    const [w, h] = (forceW && forceH) ? [forceW, forceH]
      : mode === 'min' ? MIN_SIZE[id] : repSize(id);
    let rect = firstFit(layout, id, [w, h]);
    if (!rect) { pages.push([]); layout = []; rect = firstFit(layout, id, [w, h]); }
    if (!rect) continue; // wider than a page (never happens)
    layout.push({ id, ...rect, w, h });
    pages[pages.length - 1].push({ id, ...rect, w, h });
  }

  const grid = document.getElementById('grid');
  const shown = pages[page - 1] ?? [];
  for (const r of shown) {
    const mod = byId[r.id];
    const card = document.createElement('article');
    card.className = `card card--${r.id}`;
    card.setAttribute('data-widget', r.id);
    card.innerHTML = `<h2 class="card__title">${mod.meta.title}</h2><div class="card__body"></div><div class="card__stamp" hidden></div>`;
    card.style.gridColumn = `${r.x + 1} / span ${r.w}`;
    card.style.gridRow = `${r.y + 1} / span ${r.h}`;
    card.dataset.w = r.w; card.dataset.h = r.h;
    card.classList.add(`t-${r.h <= 2 ? 's' : r.h <= 4 ? 'm' : 'l'}`);
    if (r.w <= 4) card.classList.add('t-narrow');
    grid.appendChild(card);
    try { mod.render(card.querySelector('.card__body'), DEMO_VMS[r.id], cfg); }
    catch (e) { card.querySelector('.card__body').textContent = `RENDER ERROR: ${e.message}`; }
  }

  // Deterministic measurements for the audit (read via window.__audit / #audit-meta).
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const out = [];
    for (const card of grid.querySelectorAll('.card')) {
      const body = card.querySelector('.card__body');
      const hint = card.querySelector('.more-hint');
      const cardR = card.getBoundingClientRect();
      const bodyR = body.getBoundingClientRect();
      const rec = {
        id: card.dataset.widget, w: +card.dataset.w, h: +card.dataset.h,
        rect: [Math.round(cardR.x), Math.round(cardR.y), Math.round(cardR.width), Math.round(cardR.height)],
        cardPx: [Math.round(cardR.width), Math.round(cardR.height)],
        overflowY: Math.max(0, body.scrollHeight - body.clientHeight),
        overflowX: Math.max(0, body.scrollWidth - body.clientWidth),
        // clipped text anywhere inside?
        clipped: [...body.querySelectorAll('*')].filter((el) =>
          el.scrollHeight > el.clientHeight + 1 || el.scrollWidth > el.clientWidth + 1).length,
      };
      const rowSel = body.querySelectorAll('.index, .train');
      const rows = rowSel.length ? [...rowSel] : [...body.children].filter((c) => !c.classList.contains('more-hint'));
      rec.rows = rows.map((r) => Math.round(r.getBoundingClientRect().height));
      rec.bodyClientH = body.clientHeight;
      if (hint) {
        const hr = hint.getBoundingClientRect();
        rec.hint = {
          text: hint.textContent.trim().slice(0, 40),
          fontPx: parseFloat(getComputedStyle(hint).fontSize),
          top: Math.round(hr.top - bodyR.top), height: Math.round(hr.height),
          slackBelow: Math.round(bodyR.bottom - hr.bottom),
        };
      }
      out.push(rec);
    }
    window.__audit = { mode, page, pages: pages.length, cell: [
      Math.round((grid.clientWidth - 11 * parseFloat(getComputedStyle(grid).columnGap)) / 12),
      Math.round((grid.clientHeight - 7 * parseFloat(getComputedStyle(grid).rowGap)) / 8)],
      cards: out };
    document.getElementById('audit-meta').textContent = JSON.stringify(window.__audit);
  }));
</script>
</body>
</html>
