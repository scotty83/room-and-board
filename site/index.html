<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; media-src https: blob:; connect-src 'self' https: wss:; frame-src https://monitor.ui.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>Room &amp; Board</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/room-and-board-favicon-32.png">
<link rel="apple-touch-icon" href="assets/room-and-board-icon-180.png">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
  <main id="app">
    <header id="topbar" class="topbar"></header>
    <section id="grid" class="grid" aria-live="polite"></section>
    <section id="ambient" class="ambient" hidden>
      <div id="slideshow" class="slideshow"></div>
      <div id="clockface" class="clockface" hidden></div>
      <div id="strip" class="strip"></div>
    </section>
    <section id="welcome" class="welcome" hidden></section>
    <button id="edit" class="gear gear--edit" aria-label="Edit layout"></button>
    <button id="gear" class="gear" aria-label="Settings"></button>
    <div id="settings-root"></div>
    <div id="edit-root"></div>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
