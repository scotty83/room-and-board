# Cloudflare Worker: NJT proxy + setup-code exchange + markets.
# Deploy: npx wrangler deploy (from worker/). Secrets:
#   npx wrangler secret put NJT_USER
#   npx wrangler secret put NJT_PASS
# Replace the KV id with your namespace: npx wrangler kv namespace create CODES
name = "signage-api"
main = "src/index.js"
compatibility_date = "2026-06-01"
routes = [
  { pattern = "api.roomboard.app", custom_domain = true }
]

[[kv_namespaces]]
binding = "CODES"
id = "5e78a137e235456bb0b63b5660812bff"
