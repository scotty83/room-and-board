# Cloudflare Worker: NJT proxy + setup-code exchange + markets.
# Deploy: auto-deploys via GitHub Actions (.github/workflows/deploy-worker.yml)
# on push to main when worker/ changes; manual fallback `npm run deploy:worker`
# (= npx wrangler deploy, from worker/). Secrets:
#   npx wrangler secret put NJT_USER
#   npx wrangler secret put NJT_PASS
# Replace the KV id with your namespace: npx wrangler kv namespace create CODES
# Health-alert channel (see src/health.js) — a Slack incoming-webhook URL or an
# ntfy.sh topic URL; the monitor no-ops if unset:
#   npx wrangler secret put ALERT_WEBHOOK
name = "signage-api"
main = "src/index.js"
compatibility_date = "2026-06-01"
routes = [
  { pattern = "api.roomboard.app", custom_domain = true },
  # Backup alias (re-enabled 2026-07-13): pages served from the rvc.tech
  # fallback site target this host (see site/js/env.js).
  { pattern = "signage-api.rvc.tech", custom_domain = true }
]

# Health monitor (src/health.js): validates the key endpoints' CONTENT every
# 20 min and posts to ALERT_WEBHOOK on failure. Delete this block to turn it off
# (the /health route stays available for on-demand / external checks).
[triggers]
crons = ["*/20 * * * *"]

[[kv_namespaces]]
binding = "CODES"
id = "5e78a137e235456bb0b63b5660812bff"

# Anonymous usage heartbeat (POST /fleet — named to dodge ad-blocker lists).
# The dataset is created on first write; query it via the Analytics Engine
# SQL API (needs an account token). Self-hosters who don't want metrics can
# delete this block — the route then accepts and drops pings instead of
# erroring.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "roomboard_usage"
